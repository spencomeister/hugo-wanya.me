<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}{{ end }}</title>
  <link rel="icon" type="image/png" href="/images/egg.png">
  <link rel="apple-touch-icon" href="/images/egg.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@400;500;600;700&family=RocknRoll+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  {{ block "page_styles" . }}{{ end }}
</head>
<body class="{{ .Type }} {{ .Kind }}">
  {{ partial "header.html" . }}
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
  <script src="/js/main.js" defer></script>
  {{ block "page_scripts" . }}{{ end }}
</body>
</html>
