{{ define "main" }}
{{ if .IsHome }}
<div id="loading" class="loading">
  <div class="loading-content">
    <div class="loading-text">
      <span class="jump-letter">N</span>
      <span class="jump-letter">O</span>
      <span class="jump-letter">W</span>
      <span class="jump-space">&nbsp;</span>
      <span class="jump-letter">L</span>
      <span class="jump-letter">O</span>
      <span class="jump-letter">A</span>
      <span class="jump-letter">D</span>
      <span class="jump-letter">I</span>
      <span class="jump-letter">N</span>
      <span class="jump-letter">G</span>
      <span class="jump-letter">.</span>
      <span class="jump-letter">.</span>
      <span class="jump-letter">.</span>
    </div>
    <div class="loading-subtitle">HELLO... My name is WANYA.</div>
    <div class="loading-role">ARTIST</div>
  </div>
</div>
{{ end }}

<main class="main-content" id="top">
  <div class="hero-bento-layout">
  <section id="hero" class="main-visual">
    <div class="main-image">
      <img src="/images/wanya.png" alt="WANYA Main Visual" class="fv-img" id="mainImage">
      <div class="overlay-images">
        <img src="/images/heart-fukidashi.png" alt="Heart" class="overlay-img overlay-6" id="overlay6">
        <img src="/images/egg.png" alt="Egg" class="overlay-img overlay-7" id="overlay7">
        <img src="/images/chibi-wanya.png" alt="Chibi WANYA" class="overlay-img overlay-8" id="overlay8">
        <img src="/images/wanya-eng.png" alt="WANYA" class="overlay-img overlay-9" id="overlay9">
      </div>
      <div class="image-effects">
        <div class="sparkle sparkle-1">✨</div>
        <div class="sparkle sparkle-2">⭐</div>
        <div class="sparkle sparkle-3">✨</div>
        <div class="sparkle sparkle-4">💫</div>
        <div class="sparkle sparkle-5">⭐</div>
      </div>
    </div>
    <div class="scroll-indicator">
      <div class="scroll-text">SCROLL</div>
      <div class="scroll-line"></div>
    </div>
  </section>

  {{/* Side Navigation */}}
  <nav class="side-nav" data-stagger>
    <a href="/about/" class="side-nav-item side-nav-about fade-up">
      <span class="side-nav-icon">🎨</span>
      <span class="side-nav-label">ABOUT</span>
    </a>
    <a href="/works/" class="side-nav-item side-nav-works fade-up">
      <span class="side-nav-icon">✨</span>
      <span class="side-nav-label">WORKS</span>
    </a>
    <a href="/price/" class="side-nav-item side-nav-price fade-up">
      <span class="side-nav-icon">💰</span>
      <span class="side-nav-label">PRICE</span>
    </a>
    <a href="/guidelines/" class="side-nav-item side-nav-guidelines fade-up">
      <span class="side-nav-icon">📋</span>
      <span class="side-nav-label">GUIDELINES</span>
    </a>
    <a href="/contact/" class="side-nav-item side-nav-contact fade-up">
      <span class="side-nav-icon">💌</span>
      <span class="side-nav-label">CONTACT</span>
    </a>
  </nav>
  </div>{{/* /.hero-bento-layout */}}
</main>
{{ end }}
